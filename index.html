<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cat or Dog? — Image Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <main class="stage">

    <header class="intro">
      <p class="eyebrow">a tiny machine learning experiment</p>
      <h1>Cat <span class="or">or</span> Dog?</h1>
      <p class="sub">Upload a photo. The model takes one guess.</p>
    </header>

    <section class="booth" id="booth">

      <div class="polaroid" id="polaroid">
        <div class="frame" id="dropZone">
          <img id="preview" alt="" hidden />
          <div class="placeholder" id="placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 16l4.5-6 3.5 4.5 2.5-3L20 16" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="3" y="5" width="18" height="14" rx="1.5"/>
              <circle cx="8" cy="9" r="1.3" fill="currentColor" stroke="none"/>
            </svg>
            <p>drop a photo here<br>or tap to choose</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden />
        </div>
        <div class="caption" id="caption">— ready when you are —</div>
      </div>

      <button id="classifyBtn" disabled>Develop the photo</button>

      <div class="result" id="result" hidden>
        <p class="verdict" id="verdict"></p>
        <p class="confidence" id="confidence"></p>
        <p class="rawlabel" id="rawLabel"></p>
      </div>

      <p class="error" id="errorMsg" hidden></p>

    </section>

    <footer class="foot">
      <p>Powered by MobileNetV2, trained on ImageNet · no images are stored</p>
    </footer>

  </main>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  const classifyBtn = document.getElementById('classifyBtn');
  const resultBox = document.getElementById('result');
  const verdictEl = document.getElementById('verdict');
  const confidenceEl = document.getElementById('confidence');
  const rawLabelEl = document.getElementById('rawLabel');
  const errorMsg = document.getElementById('errorMsg');
  const caption = document.getElementById('caption');
  const polaroid = document.getElementById('polaroid');

  let selectedFile = null;

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragging');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragging');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      showError("That doesn't look like an image. Try a JPG or PNG.");
      return;
    }
    selectedFile = file;
    hideError();
    resetResult();

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.hidden = false;
      placeholder.hidden = true;
      classifyBtn.disabled = false;
      caption.textContent = "— ready to develop —";
    };
    reader.readAsDataURL(file);
  }

  classifyBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    classifyBtn.disabled = true;
    classifyBtn.textContent = "Developing…";
    polaroid.classList.add('developing');
    hideError();

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || "Something went wrong.");

      showResult(data);
    } catch (err) {
      showError(err.message || "Couldn't reach the model. Try again.");
    } finally {
      classifyBtn.disabled = false;
      classifyBtn.textContent = "Develop another photo";
      polaroid.classList.remove('developing');
    }
  });

  function showResult(data) {
    resultBox.hidden = false;
    caption.textContent = "— it's developed —";

    if (data.result === 'cat') {
      verdictEl.textContent = "It's a cat. 🐱";
      verdictEl.className = "verdict cat";
    } else if (data.result === 'dog') {
      verdictEl.textContent = "It's a dog. 🐶";
      verdictEl.className = "verdict dog";
    } else {
      verdictEl.textContent = "Not sure that's a cat or dog.";
      verdictEl.className = "verdict unknown";
    }

    confidenceEl.textContent = `${data.confidence}% confident`;
    rawLabelEl.textContent = `model saw: "${data.raw_label.replace(/_/g, ' ')}"`;
  }

  function resetResult() {
    resultBox.hidden = true;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.hidden = false;
  }
  function hideError() {
    errorMsg.hidden = true;
  }
</script>

</body>
</html>
